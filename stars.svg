<svg viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="shooting stars">
  <defs>
    <linearGradient id="tail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2496ED" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#2496ED" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#5BB0F5" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- twinkling stars -->
  <g fill="#2496ED">
    <circle cx="40"  cy="30"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="90"  r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="50"  r="1.6" fill="#5BB0F5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="270" cy="110" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="25"  r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="75"  r="1.5" fill="#5BB0F5"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="40"  r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="100" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="55"  r="1.6" fill="#5BB0F5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="95"  r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="35"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="90"  cy="60"  r="1.1"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="120" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="20"  r="1.1" fill="#5BB0F5"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="120" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="20"  r="1.0"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star 1 -->
  <g opacity="0">
    <g transform="rotate(18)">
      <rect x="-75" y="-1" width="75" height="2" rx="1" fill="url(#tail)"/>
      <circle cx="0" cy="0" r="2.2" fill="#5BB0F5"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="-120 -10" to="900 300" dur="2.6s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.75;1" dur="2.6s" begin="0s" repeatCount="indefinite"/>
  </g>

  <!-- shooting star 2 -->
  <g opacity="0">
    <g transform="rotate(16)">
      <rect x="-60" y="-1" width="60" height="1.6" rx="1" fill="url(#tail)"/>
      <circle cx="0" cy="0" r="1.8" fill="#5BB0F5"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="-120 30" to="900 330" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.75;1" dur="3.2s" begin="1.1s" repeatCount="indefinite"/>
  </g>

  <!-- shooting star 3 -->
  <g opacity="0">
    <g transform="rotate(20)">
      <rect x="-90" y="-1.2" width="90" height="2.4" rx="1.2" fill="url(#tail)"/>
      <circle cx="0" cy="0" r="2.6" fill="#5BB0F5"/>
    </g>
    <animateTransform attributeName="transform" type="translate" from="-140 -40" to="900 260" dur="2.9s" begin="2.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.75;1" dur="2.9s" begin="2.0s" repeatCount="indefinite"/>
  </g>
</svg>
